<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32-clip-path - ADSO</title>
    <link rel="stylesheet" href="../styles.css">
    
    <style>
        /* Estilos específicos para lograr la transición ultra fluida de la estrella */
        .masterchief-clip {
            width: 100% !important;
            height: 400px !important;
            object-fit: cover !important;
            display: block !important;
            margin: 0 auto !important;
            
            /* Estado Inicial: Estrella totalmente formada */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%) !important;
            
            /* Control de fluidez: animación suave de 0.5 segundos con aceleración/desaceleración */
            transition: clip-path 0.5s ease-in-out !important;
        }

        /* Estado Hover: Al pasar el cursor se destransforma a la imagen cuadrada normal */
        .masterchief-clip:hover {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%) !important;
        }
    </style>
</head>
<body style="display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; min-height: 100vh !important; margin: 0 !important; box-sizing: border-box !important; position: relative !important; padding: 40px 20px !important;">

        </svg>
    </a>

    <div style="text-align: center !important; width: 100% !important; margin-bottom: 30px !important; color: #ffffff !important;">
        <h1 style="margin: 0 !important; padding: 0 !important; font-size: 2.5rem !important;">32-clip-path</h1>
        <p style="margin: 5px 0 0 0 !important; padding: 0 !important; font-size: 1.1rem !important; opacity: 0.8 !important;"></p>

    <div style="display: flex !important; justify-content: center !important; align-items: center !important; width: 100% !important; max-width: 450px !important; box-sizing: border-box !important;">
