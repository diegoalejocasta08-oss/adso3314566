<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36-transitions</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        main section 
            img {
                border: none;
                border-radius: 0
                filter: drop-shadow(0 0 12px #fff); (ostia)
            }
            img.transition01 {
                transition: transform 0.5s ease-in;
                 &:hover {
                transform: scale(1.3)
                }
            }
            img.transition02 {
                transition: transform 0.5s ease-in;
                 &:hover {
                transform: rotate(-0.5turn);
                }
            }
            img.transition03 {
                transition: transform 0.5s ease-in;
                 &:hover {
                transform: rotateY(180deg)
                }
            }
            img.transition04 {
                transition: transform 0.5s ease-in;
                 &:hover {
                transform: translateX(80px)
            }
         }
         div.box {
            background-color: #ffffff;
            height: 80px;
            margin-block: 2rem;
            width: 80px;
            transition: width 1s,
                        height 1s 1s,
                        background-color 2s 1s;
            &:hover {
                background-color: rgb(0, 0, 0);
                width:300px;
                height: 160px;
         }
    }      
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>36-transitions</h1>
            <h2>enable you to define the transition between two states of an element.</h2>
        </header>
        <section>
            <h3>scale(1.3):</h3>
            <img class="transition01" src="../imgs/dk.png" alt="DK">
            <h3>rotate(-180deg):</h3>
            <img class="transition02" src="../imgs/dk.png" alt="DK">
            <h3>rotateY(180deg):</h3>
            <img class="transition03" src="../imgs/dk.png" alt="DK">
            <h3>translateX(100px):</h3>
            <img class="transition04" src="../imgs/dk.png" alt="DK">
            <h3>multiple:</h3>
            <div class="box"></div>
        </section>
    </main>
    </body>
</html>
