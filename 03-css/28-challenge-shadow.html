    body {

      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      padding: 2rem 1rem;

    /* Botón home */
    .btn-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 8px;
      border-radius: 60px;
      transition: 0.2s ease;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.2);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-home:hover {
      background: #c00;
      transform: scale(1.05);
      border-color: #ff8888;
    }
    .btn-home svg {
      fill: white;
      display: block;
    }

      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #e0e0e0, #a0a0a0);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 8px rgba(255,50,50,0.3);
      font-weight: 800;
    }

    h2 {
      font-weight: 500;
      color: #ddd;
      margin-top: 12px;
      font-size: 1.2rem;
      border-bottom: 1px dashed #c44;
      display: inline-block;
      padding-bottom: 6px;

      font-size: 0.75rem;

      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(120,120,150,0.12) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(120,120,150,0.12) 1px, transparent 1px);
      background-size: 20px 20px;

      z-index: 15;
